<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Retrotube</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#010108;overflow:hidden;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;cursor:crosshair;}
#ui{position:fixed;inset:0;pointer-events:none;user-select:none;}
#hint{
  position:absolute;top:18px;right:18px;
  font-family:'Courier New',monospace;
  font-size:7.5px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(160,180,220,.18);
  transition:opacity 4s;
  text-align:right;line-height:1.9;
}
#toast{
  position:absolute;top:28px;left:50%;
  transform:translateX(-50%);
  font-family:'Courier New',monospace;
  font-size:9px;letter-spacing:.24em;
  color:rgba(200,220,255,.7);
  background:rgba(8,12,30,.75);
  border:1px solid rgba(120,160,255,.18);
  box-shadow:0 0 24px rgba(80,120,255,.1),inset 0 1px 0 rgba(255,255,255,.04);
  padding:7px 22px 6px;border-radius:2px;
  opacity:0;transition:opacity .35s;white-space:nowrap;
}
#longpress-ring{
  position:fixed;pointer-events:none;border-radius:50%;
  border:1.5px solid rgba(180,200,255,.65);
  box-shadow:0 0 14px rgba(120,160,255,.35);
  transform:translate(-50%,-50%) scale(0);
  transition:transform .52s cubic-bezier(.15,.8,.35,1),opacity .52s;
  opacity:0;width:56px;height:56px;
}

</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hint">draw · hold to seed · hold again to cycle · double-tap to erase</div>
  <div id="toast"></div>
</div>
<div id="longpress-ring"></div>
<script>

const cv=document.getElementById('c');
const cx=cv.getContext('2d');
let W,H,DPR=1;

function resize(){
  DPR=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);
  cv.style.width=W+'px';cv.style.height=H+'px';
  cx.setTransform(DPR,0,0,DPR,0,0);
  buildStarfield();buildNebula();
}
window.addEventListener('resize',resize);

/* ─── STARFIELD ─── */
let stars=[],nebulaBuf=null;
function buildStarfield(){
  stars=[];
  const n=Math.floor(W*H/2100);
  for(let i=0;i<n;i++){
    const temp=Math.random();
    let hue,sat;
    if(temp<.32){hue=220;sat=65;}
    else if(temp<.58){hue=200;sat=18;}
    else if(temp<.78){hue=46;sat=48;}
    else if(temp<.92){hue=28;sat=72;}
    else{hue=5;sat=82;}
    const giant=Math.random()<.025;
    stars.push({
      x:Math.random()*W,y:Math.random()*H,
      r:giant?Math.random()*1.9+1.1:Math.random()*.52+.08,
      a:giant?Math.random()*.5+.22:Math.random()*.26+.04,
      hue,sat,
      flicker:Math.random()*Math.PI*2,
      fspeed:Math.random()*.022+.003,
      giant,spike:giant&&Math.random()<.55,
      drift:{x:(Math.random()-.5)*.038,y:(Math.random()-.5)*.019},
    });
  }
}
function buildNebula(){
  const oc=document.createElement('canvas');
  oc.width=W;oc.height=H;
  const ox=oc.getContext('2d');
  const blobs=[
    {x:.22,y:.35,r:.46,hue:210,a:.03},
    {x:.7, y:.6, r:.42,hue:238,a:.025},
    {x:.5, y:.15,r:.52,hue:195,a:.02},
    {x:.15,y:.78,r:.32,hue:258,a:.018},
    {x:.85,y:.28,r:.38,hue:220,a:.022},
    {x:.55,y:.85,r:.28,hue:175,a:.014},
  ];
  for(const b of blobs){
    const g=ox.createRadialGradient(b.x*W,b.y*H,0,b.x*W,b.y*H,b.r*W);
    g.addColorStop(0,`hsla(${b.hue},58%,42%,${b.a})`);
    g.addColorStop(.5,`hsla(${b.hue},45%,28%,${b.a*.4})`);
    g.addColorStop(1,`hsla(${b.hue},30%,15%,0)`);
    ox.fillStyle=g;ox.fillRect(0,0,W,H);
  }
  nebulaBuf=oc;
}

/* ─── ARCHETYPES ─── */
const ARCHETYPES=[
  {id:'q+',hue:44, sat:92,lit:90,fieldType:'radial',sign: 1},
  {id:'q-',hue:198,sat:88,lit:74,fieldType:'radial',sign:-1},
  {id:'mn',hue:4,  sat:96,lit:68,fieldType:'dipole',sign: 1},
  {id:'ms',hue:218,sat:82,lit:64,fieldType:'dipole',sign:-1},
  {id:'il',hue:148,sat:72,lit:62,fieldType:'curl',  sign: 1},
];
const ARCHETYPE_SYMS=['✦','◎','↻','↺','⊛'];

/* ─── STATE ─── */
const S={strokes:[],nodes:[],drawing:false,cur:[],curTimes:[],frame:0,drift:{x:0,y:0}};

/* ─── PHYSICS ─── */
function fieldAt(x,y){
  let fx=0,fy=0,hs=0;
  for(const n of S.nodes){
    const A=ARCHETYPES[n.archIdx];
    const dx=n.x-x,dy=n.y-y;
    const r=Math.sqrt(dx*dx+dy*dy)+.5;
    const inv=n.str/(r+12);
    if(A.fieldType==='radial'){fx+=dx*inv*A.sign;fy+=dy*inv*A.sign;hs+=A.hue*inv*A.sign*.4;}
    else if(A.fieldType==='dipole'){const r3=r*r*r+.001;fx+=(3*dx*dy)/(r3*r*r)*inv*12*A.sign;fy+=(3*dy*dy-r*r)/(r3*r*r)*inv*12*A.sign;hs+=A.hue*inv*.5;}
    else{fx+=-dy*inv*A.sign;fy+=dx*inv*A.sign;hs+=A.hue*inv*.6;}
  }
  return{x:fx,y:fy,hueShift:hs};
}
function simulate(){
  const dt=1.1;
  S.drift.x+=.011;S.drift.y+=.007;
  for(const s of S.strokes){
    const n=s.pts.length;
    for(const p of s.pts){
      const f=fieldAt(p.x,p.y);
      const resp=1/(p.mass+.15);
      p.vx=p.vx*.72+f.x*dt*resp;p.vy=p.vy*.72+f.y*dt*resp;
      p.x+=p.vx;p.y+=p.vy;
      p.hue+=(f.hueShift-p.hue)*.015;
      if(p.x<0){p.x=0;p.vx*=-.2;}if(p.x>W){p.x=W;p.vx*=-.2;}
      if(p.y<0){p.y=0;p.vy*=-.2;}if(p.y>H){p.y=H;p.vy*=-.2;}
    }
    const rs=s.restL/(n-1);
    for(let i=0;i<n-1;i++){
      const a=s.pts[i],b=s.pts[i+1];
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)+.001;
      const k=(d-rs)/d*.28;
      const wa=1/(a.mass+.1),wb=1/(b.mass+.1),tot=wa+wb;
      a.x+=dx*k*(wa/tot);a.y+=dy*k*(wa/tot);
      b.x-=dx*k*(wb/tot);b.y-=dy*k*(wb/tot);
    }
  }
}

/* ─── STARS ─── */
function drawStars(){
  for(const s of stars){
    const sx=((s.x+S.drift.x*s.r*6)%W+W)%W;
    const sy=((s.y+S.drift.y*s.r*3)%H+H)%H;
    const flick=.7+.3*Math.sin(S.frame*s.fspeed+s.flicker);
    const alpha=s.a*flick;
    if(s.giant){
      const g=cx.createRadialGradient(sx,sy,0,sx,sy,s.r*6);
      g.addColorStop(0,`hsla(${s.hue},${s.sat}%,88%,${alpha*.32})`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      cx.beginPath();cx.arc(sx,sy,s.r*6,0,Math.PI*2);cx.fillStyle=g;cx.fill();
    }
    cx.beginPath();cx.arc(sx,sy,s.r,0,Math.PI*2);
    cx.fillStyle=`hsla(${s.hue},${s.sat}%,${s.giant?95:82}%,${alpha})`;cx.fill();
  }
}

/* ─── FIELD LINES — cached, recomputed only on node change ─── */
let fieldLineCache=[], fieldLineDirty=true;
function invalidateFieldLines(){ fieldLineDirty=true; }

function buildFieldLines(){
  fieldLineCache=[];
  const seedN=8;
  for(const n of S.nodes){
    const A=ARCHETYPES[n.archIdx];
    for(let s=0;s<seedN;s++){
      const angle=(s/seedN)*Math.PI*2;
      let x=n.x+Math.cos(angle)*20,y=n.y+Math.sin(angle)*20;
      const path=[[x,y]];
      for(let step=0;step<80;step++){
        const f=fieldAt(x,y);
        const m=Math.hypot(f.x,f.y);
        if(m<.002) break;
        x+=f.x/m*6; y+=f.y/m*6;
        if(x<0||x>W||y<0||y>H) break;
        path.push([x,y]);
      }
      if(path.length>=4) fieldLineCache.push({path,hue:A.hue,sat:A.sat,lit:A.lit});
    }
  }
  fieldLineDirty=false;
}

function drawFieldLines(){
  if(!S.nodes.length) return;
  if(fieldLineDirty) buildFieldLines();
  cx.save();cx.lineWidth=.55;
  for(const{path,hue,sat,lit} of fieldLineCache){
    cx.beginPath();
    cx.moveTo(path[0][0],path[0][1]);
    for(let i=1;i<path.length;i++) cx.lineTo(path[i][0],path[i][1]);
    cx.strokeStyle=`hsla(${hue},${sat}%,${lit}%,.06)`;
    cx.stroke();
  }
  cx.restore();
}

/* ─── NODES ─── */
function drawNodes(){
  for(const n of S.nodes){
    const A=ARCHETYPES[n.archIdx];
    const ph=S.frame*.032+n.x*.007;
    const pulse=.5+.5*Math.sin(ph);
    const {hue,sat,lit}=A;

    // Layered glow — 3 radial gradients, decreasing radius
    const glowSizes=[80,40,18];
    const glowAlphas=[.04,.09,.18];
    for(let g=0;g<3;g++){
      const r=glowSizes[g]*(1+pulse*.12);
      const gr=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,r);
      gr.addColorStop(0,`hsla(${hue},${sat}%,${lit}%,${glowAlphas[g]+pulse*.015})`);
      gr.addColorStop(.5,`hsla(${hue},${sat}%,${lit}%,${glowAlphas[g]*.3})`);
      gr.addColorStop(1,`hsla(${hue},${sat}%,${lit}%,0)`);
      cx.beginPath();cx.arc(n.x,n.y,r,0,Math.PI*2);cx.fillStyle=gr;cx.fill();
    }

    // Clean minimal glyph — just the core + one ring + archetype mark
    cx.save();cx.translate(n.x,n.y);

    // Outer ring
    cx.beginPath();cx.arc(0,0,10+pulse*2,0,Math.PI*2);
    cx.strokeStyle=`hsla(${hue},${sat}%,${lit}%,${.35+pulse*.15})`;
    cx.lineWidth=.8;cx.stroke();

    // Core dot
    cx.beginPath();cx.arc(0,0,3+pulse*.8,0,Math.PI*2);
    const coreG=cx.createRadialGradient(0,0,0,0,0,4+pulse);
    coreG.addColorStop(0,`hsla(${hue},20%,98%,.95)`);
    coreG.addColorStop(.6,`hsla(${hue},${sat}%,${lit}%,.9)`);
    coreG.addColorStop(1,`hsla(${hue},${sat}%,${lit*0.7}%,.6)`);
    cx.fillStyle=coreG;cx.fill();

    // Archetype-specific minimal mark
    cx.strokeStyle=`hsla(${hue},${sat}%,${lit}%,${.55+pulse*.2})`;
    cx.lineWidth=.9;
    if(A.id==='q+'){
      // rotating 4-spoke
      cx.save();cx.rotate(S.frame*.012);
      for(let i=0;i<4;i++){
        const a=i/4*Math.PI*2;
        cx.beginPath();cx.moveTo(Math.cos(a)*4.5,Math.sin(a)*4.5);cx.lineTo(Math.cos(a)*9,Math.sin(a)*9);cx.stroke();
      }
      cx.restore();
    } else if(A.id==='q-'){
      // counter-rotating 4-spoke
      cx.save();cx.rotate(-S.frame*.012);
      for(let i=0;i<4;i++){
        const a=i/4*Math.PI*2+Math.PI/4;
        cx.beginPath();cx.moveTo(Math.cos(a)*4.5,Math.sin(a)*4.5);cx.lineTo(Math.cos(a)*9,Math.sin(a)*9);cx.stroke();
      }
      cx.restore();
    } else if(A.id==='mn'){
      cx.save();cx.rotate(S.frame*.018);
      cx.beginPath();
      for(let t=0;t<=1;t+=.025){
        const r=3+t*8,a=t*Math.PI*2;
        t===0?cx.moveTo(Math.cos(a)*r,Math.sin(a)*r):cx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      cx.stroke();cx.restore();
    } else if(A.id==='ms'){
      cx.save();cx.rotate(-S.frame*.018);
      cx.beginPath();
      for(let t=0;t<=1;t+=.025){
        const r=3+t*8,a=-(t*Math.PI*2);
        t===0?cx.moveTo(Math.cos(a)*r,Math.sin(a)*r):cx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      cx.stroke();cx.restore();
    } else {
      // current loop: ellipse + rotating tick
      cx.beginPath();cx.ellipse(0,0,9,5,0,0,Math.PI*2);cx.stroke();
      cx.save();cx.rotate(S.frame*.024);
      cx.beginPath();cx.arc(0,-6.5,1.5,0,Math.PI*2);
      cx.fillStyle=`hsla(${hue},${sat}%,${lit}%,.8)`;cx.fill();
      cx.restore();
    }

    cx.restore();

    // Symbol above node
    cx.save();
    cx.font=`${10+pulse*1.5}px sans-serif`;
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillStyle=`hsla(${hue},${sat}%,${lit}%,${.45+pulse*.2})`;
    cx.fillText(ARCHETYPE_SYMS[n.archIdx],n.x,n.y-20-pulse*2);
    cx.restore();
  }
}

/* ─── STROKES — 2-pass, live pts ─── */
function drawStrokes(){
  for(const s of S.strokes){
    const pts=s.pts;
    if(pts.length<2) continue;
    const restSeg=s.restL/(pts.length-1);

    // PASS 1: glow
    cx.save();cx.lineCap='round';cx.lineJoin='round';
    cx.shadowBlur=16;
    for(let i=1;i<pts.length;i++){
      const a=pts[i-1],b=pts[i];
      const mass=(a.mass+b.mass)*.5;
      const hue=(a.hue+b.hue)*.5;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)+.001;
      const stretch=(d-restSeg)/(restSeg+.001);
      const L=Math.max(40,Math.min(85,62+stretch*25));
      cx.shadowColor=`hsla(${hue},80%,${L}%,.4)`;
      cx.strokeStyle=`hsla(${hue},80%,${L}%,${.07+mass*.06})`;
      cx.lineWidth=3+mass*9;
      cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);cx.stroke();
    }
    cx.shadowBlur=0;cx.restore();

    // PASS 2: crisp core
    cx.save();cx.lineCap='round';cx.lineJoin='round';
    for(let i=1;i<pts.length;i++){
      const a=pts[i-1],b=pts[i];
      const mass=(a.mass+b.mass)*.5;
      const hue=(a.hue+b.hue)*.5;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)+.001;
      const stretch=(d-restSeg)/(restSeg+.001);
      const L=Math.max(50,Math.min(94,70+stretch*20));
      cx.strokeStyle=`hsla(${hue},${60+mass*30}%,${L}%,${.6+mass*.3})`;
      cx.lineWidth=.5+mass*2.5;
      cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);cx.stroke();
    }
    cx.restore();
  }
}

/* ─── LIVE STROKE ─── */
function drawLive(){
  if(S.cur.length<2) return;
  cx.save();
  cx.lineCap='round';cx.lineJoin='round';
  // glow pass
  cx.strokeStyle='rgba(160,190,255,.12)';
  cx.lineWidth=12;
  cx.beginPath();cx.moveTo(S.cur[0].x,S.cur[0].y);
  for(const p of S.cur) cx.lineTo(p.x,p.y);
  cx.stroke();
  // core
  cx.strokeStyle='rgba(200,215,255,.5)';
  cx.lineWidth=1.2;
  cx.beginPath();cx.moveTo(S.cur[0].x,S.cur[0].y);
  for(const p of S.cur) cx.lineTo(p.x,p.y);
  cx.stroke();
  cx.restore();
}

/* ─── RENDER ─── */
function render(){
  cx.fillStyle='rgba(1,1,8,.2)';cx.fillRect(0,0,W,H);

  // Nebula
  if(nebulaBuf){
    const ox=((S.drift.x*.3)%W+W)%W;
    const oy=((S.drift.y*.18)%H+H)%H;
    cx.save();cx.globalAlpha=.55;
    cx.drawImage(nebulaBuf,-ox,-oy);
    if(ox>0) cx.drawImage(nebulaBuf,W-ox,-oy);
    if(oy>0){cx.drawImage(nebulaBuf,-ox,H-oy);if(ox>0) cx.drawImage(nebulaBuf,W-ox,H-oy);}
    cx.restore();
  }

  drawStars();
  drawFieldLines();
  drawStrokes();
  drawLive();
  drawNodes();
}

function loop(){simulate();render();S.frame++;requestAnimationFrame(loop);}

/* ─── HELPERS ─── */
function pt(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}
function nearNode(x,y,r=22){
  for(let i=S.nodes.length-1;i>=0;i--)
    if(Math.hypot(S.nodes[i].x-x,S.nodes[i].y-y)<r) return i;
  return -1;
}
function subsample(pts,maxPts=60){
  if(pts.length<=maxPts) return pts.map(p=>({...p,vx:0,vy:0}));
  const out=[],step=(pts.length-1)/(maxPts-1);
  for(let i=0;i<maxPts;i++) out.push({...pts[Math.round(i*step)],vx:0,vy:0});
  return out;
}
function commitStroke(){
  if(S.cur.length>3){
    const sub=subsample(S.cur,60);
    const speeds=[];
    for(let i=1;i<S.cur.length;i++){
      const dt=S.curTimes[i]-S.curTimes[i-1]+1;
      speeds.push(Math.hypot(S.cur[i].x-S.cur[i-1].x,S.cur[i].y-S.cur[i-1].y)/dt);
    }
    speeds.unshift(speeds[0]||0);
    const maxSpd=Math.max(...speeds,.01);
    const pts=sub.map((p,i)=>{
      const oi=Math.round(i*(S.cur.length-1)/(sub.length-1));
      const spd=speeds[Math.min(oi,speeds.length-1)];
      const mass=1-(spd/maxSpd)*.85;
      const f=fieldAt(p.x,p.y);
      const hue=((f.hueShift%360)+360)%360||200;
      return{...p,mass,hue,vx:0,vy:0};
    });
    let L=0;
    for(let i=1;i<pts.length;i++) L+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
    S.strokes.push({pts,restL:L});
  }
  S.cur=[];S.curTimes=[];S.drawing=false;
}

/* ─── TOAST ─── */
let toastTimer=null;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.style.opacity='0',2000);
}

/* ─── MOUSE ─── */
cv.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  S.drawing=true;const p=pt(e);S.cur=[p];S.curTimes=[performance.now()];
  document.getElementById('hint').style.opacity='0';
});
cv.addEventListener('mousemove',e=>{
  if(!S.drawing) return;
  const p=pt(e),l=S.cur[S.cur.length-1];
  if(Math.hypot(p.x-l.x,p.y-l.y)>4){S.cur.push(p);S.curTimes.push(performance.now());}
});
cv.addEventListener('mouseup',e=>{if(e.button===0)commitStroke();});
cv.addEventListener('mouseleave',()=>{if(S.drawing)commitStroke();});
cv.addEventListener('contextmenu',e=>{
  e.preventDefault();const p=pt(e),idx=nearNode(p.x,p.y);
  if(idx>=0){S.nodes[idx].archIdx=(S.nodes[idx].archIdx+1)%ARCHETYPES.length;}
  else{S.nodes.push({x:p.x,y:p.y,archIdx:0,str:140,phase:Math.random()*Math.PI*2});}
  invalidateFieldLines();
});
cv.addEventListener('dblclick',e=>{
  const p=pt(e),idx=nearNode(p.x,p.y,28);
  if(idx>=0){S.nodes.splice(idx,1);invalidateFieldLines();}
  else{S.strokes=[];showToast('·');}
});

/* ─── LONG-PRESS / TOUCH ─── */
const LONG_MS=480;
let lpTimer=null,lpX=0,lpY=0,lpFired=false;
const ring=document.getElementById('longpress-ring');
function startLongPress(x,y){
  lpX=x;lpY=y;lpFired=false;
  ring.style.left=x+'px';ring.style.top=y+'px';
  ring.style.transition='none';ring.style.transform='translate(-50%,-50%) scale(0)';ring.style.opacity='.88';
  ring.getBoundingClientRect();
  ring.style.transition='transform .5s cubic-bezier(.15,.8,.35,1),opacity .5s';
  ring.style.transform='translate(-50%,-50%) scale(1)';
  lpTimer=setTimeout(()=>{lpFired=true;ring.style.opacity='0';placeOrCycleNode(lpX,lpY);},LONG_MS);
}
function cancelLongPress(){
  clearTimeout(lpTimer);lpTimer=null;
  ring.style.opacity='0';ring.style.transform='translate(-50%,-50%) scale(0)';
}
function placeOrCycleNode(x,y){
  const idx=nearNode(x,y,30);
  if(idx>=0){S.nodes[idx].archIdx=(S.nodes[idx].archIdx+1)%ARCHETYPES.length;}
  else{S.nodes.push({x,y,archIdx:0,str:140,phase:Math.random()*Math.PI*2});}
  invalidateFieldLines();
}
let lastTap=0,lastTapX=0,lastTapY=0;
const DBL_MS=300,DBL_DIST=32;
cv.addEventListener('touchstart',e=>{
  e.preventDefault();document.getElementById('hint').style.opacity='0';
  if(e.touches.length===2){
    cancelLongPress();if(S.drawing)commitStroke();
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    placeOrCycleNode(mx,my);return;
  }
  if(e.touches.length>1) return;
  const p=pt(e),now=performance.now();
  const dTap=now-lastTap,dDist=Math.hypot(p.x-lastTapX,p.y-lastTapY);
  if(dTap<DBL_MS&&dDist<DBL_DIST){
    cancelLongPress();
    const idx=nearNode(p.x,p.y,34);
    if(idx>=0){S.nodes.splice(idx,1);invalidateFieldLines();}
    else{S.strokes=[];showToast('·');}
    lastTap=0;return;
  }
  lastTap=now;lastTapX=p.x;lastTapY=p.y;
  S.drawing=true;S.cur=[p];S.curTimes=[now];startLongPress(p.x,p.y);
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length>1){cancelLongPress();return;}
  if(!S.drawing) return;
  const p=pt(e),l=S.cur[S.cur.length-1];
  const moved=Math.hypot(p.x-l.x,p.y-l.y);
  if(moved>10) cancelLongPress();
  if(moved>4){S.cur.push(p);S.curTimes.push(performance.now());}
},{passive:false});
cv.addEventListener('touchend',e=>{
  e.preventDefault();cancelLongPress();
  if(!lpFired)commitStroke();else{S.cur=[];S.curTimes=[];S.drawing=false;}
},{passive:false});
cv.addEventListener('touchcancel',()=>{cancelLongPress();S.cur=[];S.curTimes=[];S.drawing=false;});

/* ─── KEYBOARD ─── */
window.addEventListener('keydown',e=>{
  if(e.key===' '){S.strokes=[];showToast('·');}
  if(e.key==='Backspace'||e.key==='Delete'){S.nodes=[];invalidateFieldLines();}
  if(e.key==='Escape'){S.strokes=[];S.nodes=[];invalidateFieldLines();}
});

resize();loop();
</script>
</body>
